<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KowaKikai(Thailand)LTD.,Part.</title>
    <link rel="icon" type="image/png" href="img/company_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #111315;
        --ink: #f5f6f7;
        --soft-ink: #b7bec8;
        --paper: #1b1f24;
        --line: #3a4049;
        --brand: #ffc107;
        --brand-dark: #d39500;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(255, 193, 7, 0.14), transparent 35%),
          radial-gradient(circle at 82% 8%, rgba(255, 193, 7, 0.08), transparent 28%),
          repeating-linear-gradient(0deg, transparent 0 34px, rgba(255, 255, 255, 0.025) 34px 35px),
          var(--bg);
        font-family: 'Noto Sans Thai', 'Zen Kaku Gothic New', sans-serif;
      }

      .navbar-custom {
        background: rgba(17, 19, 22, 0.9);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-family: 'Zen Kaku Gothic New', sans-serif;
        font-weight: 900;
        letter-spacing: 0.05em;
        color: #ffffff !important;
      }

      .lang-switch {
        display: flex;
        gap: 0.35rem;
      }

      .lang-btn {
        border: 1px solid #6f5f35;
        background: #151a1f;
        color: #f3d779;
        border-radius: 999px;
        padding: 0.25rem 0.65rem;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
      }

      .lang-btn.active {
        background: linear-gradient(135deg, #ffc107, #d39500);
        color: #111;
        border-color: #ffc107;
      }

      .brand-logo {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #7d6840;
        box-shadow: 0 0 0 2px rgba(255, 193, 7, 0.12);
      }

      .page-hero {
        margin-top: 1.2rem;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1.4rem;
      }

      .page-hero h1 {
        margin: 0;
        font-family: 'Zen Kaku Gothic New', sans-serif;
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .page-hero p {
        margin: 0.5rem 0 0;
        color: var(--soft-ink);
      }

      .work-card {
        background: #1d2228;
        border: 1px solid #444b56;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.34);
        height: 100%;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .work-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 26px rgba(255, 193, 7, 0.2);
      }

      .work-image {
        width: 100%;
        height: 230px;
        object-fit: cover;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .work-image:hover {
        transform: scale(1.03);
      }

      .work-content {
        padding: 1rem;
      }

      .work-title {
        font-weight: 800;
        margin-bottom: 0.5rem;
      }

      .work-desc {
        color: var(--soft-ink);
        margin-bottom: 0;
      }

      .btn-outline-dark {
        color: var(--brand);
        border-color: var(--brand);
        transition: transform 0.2s ease, background-color 0.2s ease;
      }

      .btn-outline-dark:hover {
        color: #111;
        background: var(--brand);
        border-color: var(--brand);
        transform: translateY(-2px);
      }

      .tag {
        display: inline-block;
        font-size: 0.74rem;
        color: var(--brand);
        border: 1px solid var(--brand);
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        margin-bottom: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .modal-content {
        border-radius: 16px;
        background: #1c2026;
        border: 1px solid #454d58;
      }

      .modal-title,
      .btn-close {
        color: #f0f2f4;
      }

      .modal-body img {
        width: 100%;
        border-radius: 10px;
      }

      .reveal-up {
        opacity: 0;
        transform: translateY(26px) scale(0.98);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }

      .reveal-up.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      footer {
        margin-top: 2rem;
        border-top: 1px solid var(--line);
        color: #aeb5bf;
        text-align: center;
        padding: 1.2rem 0;
      }

      @media (max-width: 991px) {
        .nav-tools {
          display: flex;
          flex-direction: column;
          gap: 0.55rem;
          align-items: flex-end;
        }
      }
    </style>
  </head>

      const grid = document.getElementById('portfolioGrid');
      const modal = document.getElementById('imageModal');
      const modalTitle = document.getElementById('imageModalTitle');
      const modalImage = document.getElementById('imageModalSource');
      const modalDesc = document.getElementById('imageModalDesc');
      let currentLang = 'th';
      let observer;

      function applyPageText(lang) {
        const pack = pageText[lang] || pageText.th;
        Object.keys(pack).forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            el.textContent = pack[id];
          }
        });

        modalImage.alt = pack.imageModalAlt;

        document.querySelectorAll('[data-lang-btn]').forEach((btn) => {
          btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === lang);
        });
      }

      function renderPortfolio(lang) {
        const pack = pageText[lang] || pageText.th;
        const storyPack = workText[lang] || workText.th;
        grid.innerHTML = '';

        allWorkImages.forEach((filename, index) => {
          const story = storyPack.specialWorks[filename] || storyPack.defaults[index % storyPack.defaults.length];
          const col = document.createElement('div');
          col.className = 'col-md-6 col-lg-4';
          col.innerHTML = `
            <article class="work-card reveal-up">
              <img
                src="img/${filename}"
                alt="${pack.workAltPrefix} ${index + 1}"
                class="work-image"
                loading="lazy"
                data-bs-toggle="modal"
                data-bs-target="#imageModal"
                data-title="${story.title}"
                data-desc="${story.desc}"
                data-full="img/${filename}"
              >
              <div class="work-content">
                <div class="work-title">${story.title}</div>
                <p class="work-desc">${story.desc}</p>
              </div>
            </article>
          `;
          grid.appendChild(col);
        });

        setupRevealObserver();
      }

      function setupRevealObserver() {
        if (observer) {
          observer.disconnect();
        }

        observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target);
              }
            });
          },
          {
            threshold: 0.14,
            rootMargin: '0px 0px -30px 0px'
          }
        );

        document.querySelectorAll('.reveal-up').forEach((item) => observer.observe(item));
      }

      function applyLanguage(lang) {
        currentLang = lang;
        applyPageText(lang);
        renderPortfolio(lang);
      }

      modal.addEventListener('show.bs.modal', (event) => {
        const trigger = event.relatedTarget;
        if (!trigger) {
          return;
        }

        const pagePack = pageText[currentLang] || pageText.th;
        modalTitle.textContent = trigger.getAttribute('data-title') || pagePack.modalDefault;
        modalImage.src = trigger.getAttribute('data-full') || 'img/Banner1.jpg';
        modalDesc.textContent = trigger.getAttribute('data-desc') || '';
      });

      document.querySelectorAll('[data-lang-btn]').forEach((btn) => {
        btn.addEventListener('click', () => {
          applyLanguage(btn.getAttribute('data-lang-btn'));
        });
      });

      applyLanguage('th');
